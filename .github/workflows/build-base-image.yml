name: Build Base Image

on:
  push:
    branches: [main]
    paths:
      - 'pipeline/dagster/Dockerfile.base'
  workflow_dispatch:

jobs:
  build-base:
    name: Build and push libpostal base image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: pipeline/dagster
          file: pipeline/dagster/Dockerfile.base
          push: true
          tags: ghcr.io/jahaskell53/ui-cre-libpostal-base:latest
