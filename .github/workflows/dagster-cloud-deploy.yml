name: Dagster+ Deploy

on:
  push:
    branches: [main]
    paths:
      - 'pipeline/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
    paths:
      - 'pipeline/**'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  DAGSTER_CLOUD_API_TOKEN: ${{ secrets.DAGSTER_CLOUD_API_TOKEN }}
  DAGSTER_BUILD_STATEDIR: /tmp/dagster-state

jobs:
  prod-deploy:
    name: Dagster+ Production Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dagster-cloud
        run: pip install dagster-cloud
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Initialize build session
        run: |
          dagster-cloud ci init \
            --organization openmidmarket \
            --deployment prod \
            --project-dir pipeline/dagster \
            --statedir $DAGSTER_BUILD_STATEDIR
      - name: Build Docker image
        run: |
          dagster-cloud ci build \
            --statedir $DAGSTER_BUILD_STATEDIR \
            --build-strategy docker \
            --dockerfile-path pipeline/dagster/Dockerfile
      - name: Deploy
        run: |
          dagster-cloud ci deploy \
            --statedir $DAGSTER_BUILD_STATEDIR

  branch-deploy:
    name: Dagster+ Branch Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dagster-cloud
        run: pip install dagster-cloud
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Initialize build session
        run: |
          dagster-cloud ci init \
            --organization openmidmarket \
            --project-dir pipeline/dagster \
            --statedir $DAGSTER_BUILD_STATEDIR
      - name: Build Docker image
        run: |
          dagster-cloud ci build \
            --statedir $DAGSTER_BUILD_STATEDIR \
            --build-strategy docker \
            --dockerfile-path pipeline/dagster/Dockerfile
      - name: Deploy
        run: |
          dagster-cloud ci deploy \
            --statedir $DAGSTER_BUILD_STATEDIR
      - name: Notify PR
        run: |
          dagster-cloud ci notify \
            --statedir $DAGSTER_BUILD_STATEDIR \
            --project-dir pipeline/dagster
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  branch-cleanup:
    name: Dagster+ Branch Cleanup
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dagster-cloud
        run: pip install dagster-cloud
      - name: Close branch deployment
        run: |
          dagster-cloud ci branch-deployment pipeline/dagster \
            --organization openmidmarket \
            --mark-closed
