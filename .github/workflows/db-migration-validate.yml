name: DB Migration Validate

# Triggered when the "validate-migration" label is added to a PR, or manually.
# Starts a local Supabase stack (Postgres in Docker) and applies every migration
# from scratch via `supabase db reset`. This catches real SQL errors, missing
# extensions, type conflicts, and constraint violations that dry-run cannot detect.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to post results to (leave blank to skip commenting)"
        required: false

jobs:
  db-validate:
    name: Apply migrations against local Postgres
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'validate-migration'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start --exclude studio,inbucket,imgproxy,edge-runtime,logflare,vector,pgadmin-schema-diff,migra

      - name: Apply all migrations (supabase db reset)
        id: validate
        run: |
          set +e
          supabase db reset --local > /tmp/validate-output.txt 2>&1
          EXIT=$?
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"

      - name: Stop local Supabase
        if: always()
        run: supabase stop

      - name: Determine PR number
        id: pr
        if: always()
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Post validation result as PR comment
        if: always() && steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/validate-output.txt', 'utf8').trim();
            const exitCode = '${{ steps.validate.outputs.exit_code }}';
            const failed = exitCode !== '0';
            const output = raw.length > 0 ? raw : '(no output)';
            const header = failed
              ? '## Supabase DB Migration Validate — FAILED'
              : '## Supabase DB Migration Validate — PASSED';
            const body = failed
              ? `${header}\n\n:x: Migrations failed to apply (exit code ${exitCode}):\n\n\`\`\`\n${output}\n\`\`\``
              : `${header}\n\n:white_check_mark: All migrations applied successfully against a fresh local Postgres instance.\n\n\`\`\`\n${output}\n\`\`\``;

            const prNumber = parseInt('${{ steps.pr.outputs.number }}', 10);
            if (!prNumber) { core.info('No PR number — skipping comment'); return; }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.body.startsWith('## Supabase DB Migration Validate')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Fail job if migrations errored
        if: steps.validate.outputs.exit_code != '0'
        run: |
          echo "Migration validation failed with exit code ${{ steps.validate.outputs.exit_code }}"
          cat /tmp/validate-output.txt
          exit 1
