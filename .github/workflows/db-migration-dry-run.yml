name: DB Migration Dry Run

on:
  pull_request:
    branches: [main]

jobs:
  db-dry-run:
    name: Supabase DB dry run
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Run migration dry run (with auto-repair)
        id: dry-run
        run: |
          set +e
          supabase db push --dry-run --linked > /tmp/dry-run-output.txt 2>&1
          EXIT=$?

          if [ $EXIT -ne 0 ] && grep -q "Remote migration versions not found" /tmp/dry-run-output.txt; then
            # Extract versions Supabase tells us to repair and mark them as reverted
            VERSIONS=$(grep -oP '(?<=migration repair --status reverted )\d+' /tmp/dry-run-output.txt)
            for version in $VERSIONS; do
              echo "Repairing orphaned remote migration: $version"
              supabase migration repair --status reverted "$version" --linked
            done
            # Retry after repair
            supabase db push --dry-run --linked > /tmp/dry-run-output.txt 2>&1
            EXIT=$?
          fi

          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Log dry-run failure output
        if: always() && steps.dry-run.outputs.exit_code != '0'
        run: |
          echo "Supabase db push --dry-run failed (exit ${{ steps.dry-run.outputs.exit_code }}). Full output:"
          echo "-----"
          cat /tmp/dry-run-output.txt
          echo "-----"

      - name: Post pending SQL as PR comment
        if: always() && steps.dry-run.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/dry-run-output.txt', 'utf8').trim();
            const output = raw.length > 0 ? raw : '(no pending migrations)';
            const body = `## Supabase DB Migration Dry Run\n\nSQL that will be applied to production on merge:\n\n\`\`\`sql\n${output}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body.startsWith('## Supabase DB Migration Dry Run')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if dry run errored
        if: steps.dry-run.outputs.exit_code != '0'
        run: |
          echo "Dry run failed with exit code ${{ steps.dry-run.outputs.exit_code }}"
          exit 1
