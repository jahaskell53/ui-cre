name: DB Migration Dry Run

on:
  pull_request:
    branches: [main]

jobs:
  db-shadow-apply:
    name: Supabase DB shadow apply
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    services:
      # supabase/postgres ships with the Supabase-managed schemas (auth, storage, etc.)
      # already initialized. We need those because production migrations FK-reference
      # auth.users, and `supabase db dump --linked` excludes managed schemas — so a bare
      # postgres image would fail to restore those constraints.
      shadow-postgres:
        image: supabase/postgres:17.6.1.113
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 60
          --health-start-period 30s

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SHADOW_DB_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for shadow Postgres readiness
        run: |
          for i in $(seq 1 60); do
            if pg_isready -h localhost -p 5432 -U postgres >/dev/null 2>&1; then
              echo "shadow postgres is ready"
              exit 0
            fi
            sleep 2
          done
          echo "shadow postgres did not become ready in time"
          exit 1

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Dump prod custom roles
        # Captures any custom Postgres roles defined in production (e.g. `prisma`)
        # that don't ship with the supabase/postgres image. Schema dump references
        # these roles via OWNER TO / GRANT TO statements, so they must exist before
        # the schema is restored.
        run: supabase db dump --linked --role-only -f /tmp/prod-roles.sql

      - name: Dump prod schema (public + user schemas; managed schemas excluded)
        run: supabase db dump --linked -f /tmp/prod-schema.sql

      - name: Dump prod migration history (DDL)
        run: supabase db dump --linked --schema supabase_migrations -f /tmp/prod-history-schema.sql

      - name: Dump prod migration history (data)
        run: supabase db dump --linked --schema supabase_migrations --data-only --use-copy -f /tmp/prod-history-data.sql

      - name: Restore prod state into shadow Postgres
        run: |
          set -euo pipefail
          # Roles first. Standard supabase roles (postgres, authenticated, anon,
          # service_role, supabase_admin, etc.) already exist on the supabase/postgres
          # image — those CREATE ROLE statements will fail with "already exists" and
          # that's expected, so we don't stop on error here. Custom roles (e.g.
          # `prisma`) that aren't on the base image will be created.
          psql "$SHADOW_DB_URL" -v ON_ERROR_STOP=0 -f /tmp/prod-roles.sql > /tmp/restore-roles.log 2>&1 || true
          # Grant the connecting `postgres` user membership in every non-system role
          # so that subsequent ALTER ... OWNER TO "<custom_role>" statements in the
          # schema dump are permitted (Postgres requires the executing role to be a
          # member of the target ownership role).
          psql "$SHADOW_DB_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE r record;
          BEGIN
            FOR r IN
              SELECT rolname FROM pg_roles
              WHERE rolname NOT LIKE 'pg_%'
                AND rolname <> 'postgres'
            LOOP
              EXECUTE format('GRANT %I TO postgres', r.rolname);
            END LOOP;
          END $$;
          SQL
          # Schema must apply cleanly. The auth/storage schemas already exist in
          # supabase/postgres so FKs to auth.users resolve, and any roles referenced
          # by OWNER/GRANT exist (and are now grantable) after the previous steps.
          psql "$SHADOW_DB_URL" -v ON_ERROR_STOP=1 -f /tmp/prod-schema.sql
          # supabase_migrations schema may already exist on the image — tolerate "already exists".
          psql "$SHADOW_DB_URL" -v ON_ERROR_STOP=0 -f /tmp/prod-history-schema.sql > /tmp/restore-history-schema.log 2>&1 || true
          psql "$SHADOW_DB_URL" -v ON_ERROR_STOP=1 -f /tmp/prod-history-data.sql

      - name: Capture pending SQL (dry-run against shadow)
        id: pending-sql
        run: |
          set +e
          supabase db push --dry-run --db-url "$SHADOW_DB_URL" > /tmp/dry-run-output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Apply pending migrations to shadow Postgres
        id: apply
        run: |
          set +e
          supabase db push --db-url "$SHADOW_DB_URL" > /tmp/apply-output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload migration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-migration-shadow-logs-${{ github.event.pull_request.head.sha }}
          path: |
            /tmp/dry-run-output.txt
            /tmp/apply-output.txt
            /tmp/restore-roles.log
            /tmp/restore-history-schema.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Post shadow-apply result as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const read = (p) => {
              try { return fs.readFileSync(p, 'utf8').trim(); } catch { return ''; }
            };
            const dryRun = read('/tmp/dry-run-output.txt');
            const apply  = read('/tmp/apply-output.txt');
            const dryExit   = '${{ steps.pending-sql.outputs.exit_code }}';
            const applyExit = '${{ steps.apply.outputs.exit_code }}';
            const failed = applyExit !== '0' || dryExit !== '0';

            const pendingBlock = dryRun.length > 0 ? dryRun : '(no pending migrations)';
            const applyBlock   = apply.length > 0 ? apply : '(no output)';

            const header = failed
              ? '## Supabase DB Migration Shadow Apply — ERROR'
              : '## Supabase DB Migration Shadow Apply';

            const body = [
              header,
              '',
              failed
                ? `:x: Shadow apply failed (dry-run exit ${dryExit}, apply exit ${applyExit}). The pending migration(s) will not run cleanly against a database mirroring production schema.`
                : ':white_check_mark: Pending migration(s) applied successfully against a Postgres container loaded with a fresh dump of production schema and migration history.',
              '',
              '<details><summary>Pending SQL (dry-run)</summary>',
              '',
              '```sql',
              pendingBlock,
              '```',
              '',
              '</details>',
              '',
              '<details><summary>Shadow apply output</summary>',
              '',
              '```',
              applyBlock,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.body.startsWith('## Supabase DB Migration Shadow Apply') ||
              c.body.startsWith('## Supabase DB Migration Dry Run')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if shadow apply errored
        if: steps.apply.outputs.exit_code != '0' || steps.pending-sql.outputs.exit_code != '0'
        run: |
          echo "Shadow apply failed. dry-run exit=${{ steps.pending-sql.outputs.exit_code }} apply exit=${{ steps.apply.outputs.exit_code }}"
          exit 1
