name: DB Migration Apply

on:
  push:
    branches: [main]

jobs:
  db-migrate:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Apply migrations to production (with auto-repair)
        run: |
          set +e
          while true; do
            OUTPUT=$(supabase db push --linked 2>&1)
            EXIT=$?
            echo "$OUTPUT"
            if [ $EXIT -eq 0 ]; then
              break
            fi
            if ! echo "$OUTPUT" | grep -q "Remote migration versions not found"; then
              exit $EXIT
            fi
            # Supabase lists all orphaned versions on one line after this prefix; a single
            # \d+ lookbehind only matched the first ID (later IDs follow a space, not the prefix).
            REPAIR_LINE=$(echo "$OUTPUT" | grep 'migration repair --status reverted' | head -n1 || true)
            VERSIONS=$(echo "$REPAIR_LINE" | sed 's/.*migration repair --status reverted //')
            if [ -z "$VERSIONS" ]; then
              exit $EXIT
            fi
            for version in $VERSIONS; do
              echo "Repairing orphaned remote migration: $version"
              supabase migration repair --status reverted "$version" --linked || exit $?
            done
          done
          set -e
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
