name: DB Migration Apply

on:
  push:
    branches: [main]

jobs:
  db-migrate:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Apply migrations to production (with auto-repair)
        run: |
          set +e
          OUTPUT=$(supabase db push --linked 2>&1)
          EXIT=$?
          echo "$OUTPUT"

          if [ $EXIT -ne 0 ] && echo "$OUTPUT" | grep -q "Remote migration versions not found"; then
            VERSIONS=$(echo "$OUTPUT" | grep -oP '(?<=migration repair --status reverted )\d+')
            for version in $VERSIONS; do
              echo "Repairing orphaned remote migration: $version"
              supabase migration repair --status reverted "$version" --linked
            done
            # Retry after repair
            set -e
            supabase db push --linked
          else
            set -e
            [ $EXIT -eq 0 ] || exit $EXIT
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
