name: DB Migration Apply

on:
  push:
    branches: [main]

jobs:
  db-migrate:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Repair orphaned remote migrations
        run: |
          # Find remote migrations that have no matching local file and mark them
          # as reverted so that db push does not abort.
          ORPHANED=$(supabase migration list --linked 2>/dev/null \
            | awk -F'│' 'NR>2 {
                local=$1; gsub(/[[:space:]]/, "", local)
                remote=$2; gsub(/[[:space:]]/, "", remote)
                if (local == "" && remote ~ /^[0-9]{14}$/) print remote
              }')
          for version in $ORPHANED; do
            echo "Repairing orphaned remote migration: $version"
            supabase migration repair --status reverted "$version" --linked
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Apply migrations to production
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
