name: Tests

on:
    push:
        branches: ["*"]
    pull_request:
        branches: ["*"]

jobs:
    test:
        runs-on: ubuntu-latest
        env:
            GITHUB_EVENT_NAME: ${{ github.event_name }}
            GITHUB_SHA: ${{ github.sha }}
            GITHUB_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
            GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
            GITHUB_PUSH_BEFORE: ${{ github.event.before }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Cache Bun install cache
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Check Prettier formatting
              run: bun run format:check

            - name: Check application build
              run: bun run build

            - name: Verify CI Vitest change classifier
              run: node --test scripts/ci/vitest-changes-classifier.test.mjs

            - name: Run unit tests (full or Vitest related to changed paths)
              run: node scripts/ci/run-vitest-for-changes.mjs unit

            - name: Run DB integration tests (when schema, migrations, or integration tests change)
              run: node scripts/ci/run-vitest-for-changes.mjs integration
              env:
                  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
